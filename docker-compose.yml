services:
  frontend:
    # image: nguyennan12/novalive-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    working_dir: /app/apps/frontend
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - /app/apps/frontend/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    command: yarn dev --host 0.0.0.0 --port 80
    networks:
      - livestream-ecommerce-network

  backend:
    # image: nguyennan12/novalive-backend:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    working_dir: /app/apps/backend
    ports:
      - "3031:3031"
    env_file:
      - .env
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - /app/apps/backend/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=dev
      - TZ=Asia/Ho_Chi_Minh
    stdin_open: true
    tty: true
    command: yarn dev
    depends_on:
      mongodb_db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - livestream-ecommerce-network
    restart: unless-stopped

  mongodb_db:
    image: mongo:8.0
    networks:
      - livestream-ecommerce-network
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - livestream-ecommerce-network
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - livestream-ecommerce-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER_NAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required in .env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - livestream-ecommerce-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  livestream-ecommerce-network:
    driver: bridge

volumes:
  root_node_modules:
  mongo_data:
  es_data:
  rabbitmq_data:
  redis_data:
